ai_standards_version = "1.3.0"
project_version = "replace-me"
project_release_date = "YYYY-MM-DD"
fragments = [
  "core/base",
  "core/git-workflow",
  "core/architecture",
  "core/error-handling",
]
features = [
  "conport",
  "design-first-collaboration",
  "reasoning-hygiene",
  "autonomy-boundaries",
  "structured-artifacts",
]
stacks = [
  "python",
  "fastapi",
]
local_overrides = [
  "docs/ai/project-rules.md",
]
optional_local_overrides = [
  "docs/ai/private-rules.local.md",
]

[tooling]
agents = []

[tooling.cursor]
deploy_project_preflight = false
deploy_workspace_router = false
# workspace_root is resolved relative to project_root.
workspace_root = "."
# Optional stable slug for workspace router filename.
project_slug = "replace-me"

[metadata]
project_name = "replace-me"
notes = "Project-specific AI configuration using manifest-only dependencies."
